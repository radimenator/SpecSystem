implementation_repositories:
  - id: catalog-services-app
    type: application

    git:
      remote: git@github.com:radimenator/catalog-services-app.git
      default_branch: main

    specification:
      project_path: /srv/workspace/spec-system/projects/catalog-services

    environments:
      local_macbook:
        role: primary-development
        workspace_root: /Users/radimpokorny/Projects/catalog-services-app

      vps_workspace:
        role: ai-execution-and-runtime
        workspace_root: /srv/workspace/repos/catalog-services-app

    regeneration:
      allowed_target:
        - vps_workspace

    ownership:
      canonical_source: git_remote
      runtime_execution: vps_workspace
      specification_source: spec-system

    notes:
      - SPEC repository and implementation repository must remain separated
      - AI regeneration runs must target only implementation repository
      - generated code must never be written into spec-system
